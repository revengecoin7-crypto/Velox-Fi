kind = "web"
previewPath = "/"
title = "VeloxFi"
version = "1.0.0"
id = "artifacts/veloxfi"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24044

[services.development]
run = "pnpm --filter @workspace/veloxfi run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/veloxfi", "run", "build" ]
publicDir = "artifacts/veloxfi/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24044"
BASE_PATH = "/"
